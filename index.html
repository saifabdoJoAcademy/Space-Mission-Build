<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Space Mission</title>
<meta name="description" content="">
<link rel="shortcut icon" href="TemplateData/favicon.ico">
<link rel="stylesheet" href="TemplateData/style.css">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no,
               viewport-fit=cover">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: rgb(255, 255, 255);
}

#unity-container {
    position: fixed;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start; /* keep logo/loading bar at top */
    box-sizing: border-box;
    background: rgb(255, 255, 255);
}

#unity-canvas-container {
    width: 100%;
    height: 100%; /* fill container fully, no margin */
    background: rgb(255, 255, 255);
}

#unity-canvas {
    width: 100%;
    height: 100%;
    background: rgb(255, 255, 255);
    display: block;
}

/* Rotate overlay */
#rotate-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: none;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-family: sans-serif;
    font-size: 22px;
    z-index: 9999;
}
</style>
</head>
<body>

<!-- Rotate overlay -->
<div id="rotate-overlay">
  Please rotate your device to landscape
</div>

<div id="unity-container">
  <div id="unity-canvas-container">
    <canvas id="unity-canvas"></canvas>
  </div>
  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>
  <div id="unity-footer">
    <div id="unity-fullscreen-button"></div>
  </div>
</div>

<script>
var buildUrl = "Build";
var loaderUrl = buildUrl + "/Space Mission.loader.js";
var config = {
  dataUrl: buildUrl + "/Space Mission.data",
  frameworkUrl: buildUrl + "/Space Mission.framework.js",
  codeUrl: buildUrl + "/Space Mission.wasm",
  streamingAssetsUrl: "StreamingAssets",
  companyName: "Ula",
  productName: "Space Mission",
  productVersion: "1.0",
};

var container = document.querySelector("#unity-container");
var canvas = document.querySelector("#unity-canvas");
var canvasContainer = document.querySelector("#unity-canvas-container");
var loadingBar = document.querySelector("#unity-loading-bar");
var progressBarFull = document.querySelector("#unity-progress-bar-full");
var fullscreenButton = document.querySelector("#unity-fullscreen-button");
var unityInstance = null;

// Resize canvas dynamically (fills container)
function resizeCanvas() {
  canvas.width = canvasContainer.offsetWidth;
  canvas.height = canvasContainer.offsetHeight;
}

window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", resizeCanvas);
resizeCanvas();


loadingBar.style.display = "block";

var script = document.createElement("script");
script.src = loaderUrl;
script.onload = () => {
  createUnityInstance(canvas, config, (progress) => {
    progressBarFull.style.width = 100 * progress + "%";
  }).then((instance) => {
    unityInstance = instance;
    loadingBar.style.display = "none";

    if (fullscreenButton) {
      fullscreenButton.onclick = () => {
        unityInstance.SetFullscreen(1); // Unity handles fullscreen properly
        // Also force resize just in case
        setTimeout(() => { window.dispatchEvent(new Event("resize")); }, 200);
      };
    }
  }).catch((message) => {
    alert(message);
  });
};
document.body.appendChild(script);

// Rotate overlay enforcement
function checkOrientation() {
  var overlay = document.getElementById("rotate-overlay");
  overlay.style.display = window.innerHeight > window.innerWidth ? "flex" : "none";
}
window.addEventListener("resize", checkOrientation);
window.addEventListener("orientationchange", checkOrientation);
checkOrientation();
</script>
</body>
</html>
