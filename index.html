<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Space Mission</title>
    <meta name="description" content="">
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
    </style>
  </head>

  <script>
    function checkOrientation() {
      if (window.innerHeight > window.innerWidth) {
          document.getElementById("rotateMessage").style.display = "flex";
          document.getElementById("unity-container").style.display = "none";
      } else {
          document.getElementById("rotateMessage").style.display = "none";
          document.getElementById("unity-container").style.display = "block";
      }

      //resizeCanvas
      const canvas = document.querySelector("#unity-canvas-container");
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
  }

  window.addEventListener("resize", checkOrientation);
  window.addEventListener("orientationchange", checkOrientation);
  window.onload = checkOrientation;
  </script>

  <body>
    <div id="rotateMessage" style="
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    color:white;
    z-index:9999;
    justify-content:center;
    align-items:center;
    font-size:24px;
    text-align:center;">
    Please rotate your device to landscape
    </div>
    
    <div id="unity-container">
      <div id="unity-canvas-container">
        <canvas id="unity-canvas" style="width: 100%; height: 100%;"></canvas>
      </div>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-footer">
        <div id="unity-fullscreen-button"></div>
      </div>
    </div>
    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Space Mission.loader.js";
      var config = {
        dataUrl: buildUrl + "/Space Mission.data",
        frameworkUrl: buildUrl + "/Space Mission.framework.js",
        codeUrl: buildUrl + "/Space Mission.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Ula",
        productName: "Space Mission",
        productVersion: "1.0",
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var canvasContainer = document.querySelector("#unity-canvas-container");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var unityInstance = null;

      canvasContainer.style.width = "960px";
      canvasContainer.style.height = "600px";
      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((instance) => {
          unityInstance = instance;
          loadingBar.style.display = "none";
          if (fullscreenButton)
          {
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
