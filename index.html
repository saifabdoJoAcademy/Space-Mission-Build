<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>Space Mission</title>

  <!-- Mobile viewport fix -->
  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1.0,
                 maximum-scale=1.0,
                 user-scalable=no,
                 viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #unity-container {
      position: fixed;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      background: black;
    }

    #unity-loading-bar {
      position: absolute;
      bottom: 10%;
      width: 50%;
      height: 20px;
      background: #333;
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: #00ffcc;
    }

    #unity-fullscreen-button {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 10px 15px;
      background: rgba(0,0,0,0.6);
      color: white;
      font-family: sans-serif;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div id="unity-container">
  <canvas id="unity-canvas"></canvas>

  <div id="unity-loading-bar">
    <div id="unity-progress-bar-full"></div>
  </div>

  <div id="unity-fullscreen-button">Fullscreen</div>
</div>

<script>
  var buildUrl = "Build";
  var loaderUrl = buildUrl + "/Space Mission.loader.js";

  var config = {
    dataUrl: buildUrl + "/Space Mission.data",
    frameworkUrl: buildUrl + "/Space Mission.framework.js",
    codeUrl: buildUrl + "/Space Mission.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "Ula",
    productName: "Space Mission",
    productVersion: "1.0",
  };

  var canvas = document.querySelector("#unity-canvas");
  var loadingBar = document.querySelector("#unity-loading-bar");
  var progressBarFull = document.querySelector("#unity-progress-bar-full");
  var fullscreenButton = document.querySelector("#unity-fullscreen-button");

  var unityInstance = null;

  var script = document.createElement("script");
  script.src = loaderUrl;

  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      progressBarFull.style.width = (100 * progress) + "%";
    }).then((instance) => {
      unityInstance = instance;
      loadingBar.style.display = "none";
    }).catch((message) => {
      alert(message);
    });
  };

  document.body.appendChild(script);

  // Cross-platform fullscreen handler
  fullscreenButton.onclick = function () {

    var container = document.getElementById("unity-container");

    if (container.requestFullscreen) {
      container.requestFullscreen().then(() => {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock("landscape").catch(() => {});
        }
      }).catch(() => {});
    }
    else if (container.webkitRequestFullscreen) {
      container.webkitRequestFullscreen();
    }

    // Force resize refresh (important for mobile)
    setTimeout(() => {
      window.dispatchEvent(new Event("resize"));
    }, 500);
  };

  // Resize handler (important for iOS)
  window.addEventListener("resize", function () {
    canvas.style.width = "100%";
    canvas.style.height = "100%";
  });
</script>

</body>
</html>
