<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Space Mission</title>
    <meta name="description" content="">
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            touch-action: none; /* prevent scrolling on mobile */
        }

        #unity-container, #unity-canvas-container, #unity-canvas {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #unity-canvas {
            display: block;
            margin: 0 auto;
            transform-origin: center center;
        }
    </style>
</head>
<body>
<div id="unity-container">
    <div id="unity-canvas-container">
        <canvas id="unity-canvas"></canvas>
    </div>
    <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
        </div>
    </div>
    <div id="unity-footer">
        <div id="unity-fullscreen-button"></div>
    </div>
</div>

<script>
    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/Space Mission.loader.js";
    var config = {
        dataUrl: buildUrl + "/Space Mission.data",
        frameworkUrl: buildUrl + "/Space Mission.framework.js",
        codeUrl: buildUrl + "/Space Mission.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Ula",
        productName: "Space Mission",
        productVersion: "1.0",
    };

    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var canvasContainer = document.querySelector("#unity-canvas-container");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var unityInstance = null;

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
        }).then((instance) => {
            unityInstance = instance;
            loadingBar.style.display = "none";

            // Fullscreen button handler
            if (fullscreenButton) {
                fullscreenButton.onclick = () => {
                    unityInstance.SetFullscreen(1);
                    forceLandscape();
                };
            }

            // Recalculate if user resizes window
            window.addEventListener("resize", () => {
                if (document.fullscreenElement) {
                    forceLandscape();
                } else {
                    resetCanvas();
                }
            });

        }).catch((message) => {
            alert(message);
        });
    };
    document.body.appendChild(script);

    // Force landscape by rotating canvas if needed
    function forceLandscape() {
        let width = window.innerWidth;
        let height = window.innerHeight;

        if (height > width) {
            // Portrait → rotate 90 degrees
            canvasContainer.style.width = height + "px";
            canvasContainer.style.height = width + "px";
            canvas.style.transform = "rotate(90deg)";
        } else {
            // Already landscape
            canvasContainer.style.width = width + "px";
            canvasContainer.style.height = height + "px";
            canvas.style.transform = "";
        }
    }

    // Reset canvas when exiting fullscreen
    function resetCanvas() {
        canvasContainer.style.width = window.innerWidth + "px";
        canvasContainer.style.height = window.innerHeight + "px";
        canvas.style.transform = "";
    }
</script>
</body>
</html>
